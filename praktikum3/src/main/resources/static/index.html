<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sistem Data KTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        :root {
          --primary: #1a56db;
          --primary-dark: #1342b0;
          --primary-light: #e8f0fe;
          --danger: #e02424;
          --success: #057a55;
          --warning: #c27803;
          --bg: #f4f6fb;
          --card: #ffffff;
          --border: #e2e8f0;
          --text: #1e293b;
          --muted: #64748b;
          --radius: 14px;
          --shadow: 0 4px 24px rgba(26,86,219,0.08);
        }

        * { box-sizing: border-box; }

        body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: var(--bg);
          color: var(--text);
          min-height: 100vh;
        }

        /* ── NAVBAR ── */
        .navbar-custom {
          background: var(--primary);
          padding: 0.85rem 1.5rem;
          box-shadow: 0 2px 16px rgba(26,86,219,0.18);
        }
        .navbar-custom .brand {
          display: flex; align-items: center; gap: 10px;
          color: #fff; font-weight: 700; font-size: 1.15rem; text-decoration: none;
        }
        .navbar-custom .brand .icon-wrap {
          width: 36px; height: 36px; background: rgba(255,255,255,0.15);
          border-radius: 9px; display: flex; align-items: center; justify-content: center;
        }

        /* ── TOAST ── */
        #toast-container {
          position: fixed; top: 72px; right: 20px; z-index: 9999;
          display: flex; flex-direction: column; gap: 10px;
        }
        .toast-item {
          min-width: 280px; max-width: 360px;
          padding: 13px 18px; border-radius: 10px;
          font-size: 0.875rem; font-weight: 500;
          display: flex; align-items: center; gap: 10px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.12);
          animation: slideIn 0.3s ease;
        }
        .toast-item.success { background: #f0fdf4; border-left: 4px solid #057a55; color: #065f46; }
        .toast-item.error   { background: #fef2f2; border-left: 4px solid #e02424; color: #991b1b; }
        .toast-item.info    { background: #eff6ff; border-left: 4px solid #1a56db; color: #1e3a8a; }
        @keyframes slideIn {
          from { transform: translateX(60px); opacity: 0; }
          to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes fadeOut {
          from { opacity: 1; }
          to   { opacity: 0; transform: translateX(60px); }
        }

        /* ── LAYOUT ── */
        .main-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }

        .page-header {
          margin-bottom: 28px;
        }
        .page-header h1 {
          font-size: 1.65rem; font-weight: 700; margin: 0 0 4px;
        }
        .page-header p { color: var(--muted); margin: 0; font-size: 0.9rem; }

        /* ── CARD ── */
        .card-custom {
          background: var(--card);
          border-radius: var(--radius);
          border: 1px solid var(--border);
          box-shadow: var(--shadow);
          overflow: hidden;
        }
        .card-header-custom {
          padding: 18px 24px;
          border-bottom: 1px solid var(--border);
          display: flex; align-items: center; justify-content: space-between;
          gap: 12px; flex-wrap: wrap;
        }
        .card-header-custom h5 {
          font-size: 1rem; font-weight: 700; margin: 0;
          display: flex; align-items: center; gap: 8px;
        }
        .card-body-custom { padding: 24px; }

        /* ── FORM ── */
        .form-label { font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
        .form-control, .form-select {
          border-radius: 9px; border: 1.5px solid var(--border);
          font-size: 0.9rem; padding: 9px 13px;
          transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus, .form-select:focus {
          border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
        }
        .form-control.is-invalid { border-color: var(--danger); }

        /* ── BUTTONS ── */
        .btn-primary-custom {
          background: var(--primary); color: #fff; border: none;
          border-radius: 9px; padding: 9px 20px; font-weight: 600; font-size: 0.88rem;
          display: inline-flex; align-items: center; gap: 7px;
          transition: background .2s, transform .1s, box-shadow .2s;
          cursor: pointer;
        }
        .btn-primary-custom:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(26,86,219,0.25); }
        .btn-primary-custom:active { transform: scale(0.97); }

        .btn-secondary-custom {
          background: #f1f5f9; color: var(--text); border: 1.5px solid var(--border);
          border-radius: 9px; padding: 9px 20px; font-weight: 600; font-size: 0.88rem;
          display: inline-flex; align-items: center; gap: 7px;
          transition: background .2s; cursor: pointer;
        }
        .btn-secondary-custom:hover { background: #e2e8f0; }

        /* ── TABLE ── */
        .table-wrap { overflow-x: auto; }
        table.ktp-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        table.ktp-table th {
          background: #f8fafc; padding: 11px 16px;
          text-align: left; font-size: 0.75rem; font-weight: 700;
          color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
          border-bottom: 1.5px solid var(--border); white-space: nowrap;
        }
        table.ktp-table td {
          padding: 13px 16px; border-bottom: 1px solid var(--border);
          vertical-align: middle;
        }
        table.ktp-table tr:last-child td { border-bottom: none; }
        table.ktp-table tr:hover td { background: #f8fafc; }

        .badge-gender {
          display: inline-block; padding: 3px 10px; border-radius: 20px;
          font-size: 0.75rem; font-weight: 600;
        }
        .badge-gender.laki   { background: #eff6ff; color: #1e40af; }
        .badge-gender.perempuan { background: #fdf2f8; color: #9d174d; }

        .action-btn {
          width: 32px; height: 32px; border-radius: 8px; border: none;
          display: inline-flex; align-items: center; justify-content: center;
          cursor: pointer; transition: background .15s, transform .1s; font-size: 0.85rem;
        }
        .action-btn:active { transform: scale(0.9); }
        .btn-edit { background: #eff6ff; color: #1a56db; }
        .btn-edit:hover { background: #dbeafe; }
        .btn-delete { background: #fef2f2; color: #e02424; }
        .btn-delete:hover { background: #fee2e2; }

        /* ── EMPTY STATE ── */
        .empty-state {
          text-align: center; padding: 56px 20px; color: var(--muted);
        }
        .empty-state .empty-icon {
          font-size: 3rem; margin-bottom: 12px; opacity: .35;
        }
        .empty-state p { margin: 0; font-size: 0.9rem; }

        /* ── LOADING ── */
        .spinner-wrap {
          text-align: center; padding: 48px;
        }
        .spinner-custom {
          width: 36px; height: 36px;
          border: 3px solid var(--primary-light);
          border-top-color: var(--primary);
          border-radius: 50%;
          animation: spin .75s linear infinite;
          margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MODAL ── */
        .modal-overlay {
          display: none; position: fixed; inset: 0;
          background: rgba(0,0,0,0.45); z-index: 1050;
          align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
          background: #fff; border-radius: var(--radius);
          width: 100%; max-width: 520px; margin: 20px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.18);
          animation: modalIn .25s ease;
        }
        @keyframes modalIn {
          from { transform: scale(0.94); opacity: 0; }
          to   { transform: scale(1);    opacity: 1; }
        }
        .modal-head {
          padding: 20px 24px; border-bottom: 1px solid var(--border);
          display: flex; align-items: center; justify-content: space-between;
        }
        .modal-head h5 { font-size: 1rem; font-weight: 700; margin: 0; }
        .modal-close {
          width: 30px; height: 30px; border-radius: 7px; border: none;
          background: #f1f5f9; color: var(--muted); cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          transition: background .15s;
        }
        .modal-close:hover { background: #e2e8f0; }
        .modal-body-inner { padding: 24px; }
        .modal-footer-inner {
          padding: 16px 24px; border-top: 1px solid var(--border);
          display: flex; gap: 10px; justify-content: flex-end;
        }

        /* ── CONFIRM MODAL ── */
        .confirm-icon {
          width: 56px; height: 56px; border-radius: 50%;
          background: #fef2f2; color: #e02424;
          display: flex; align-items: center; justify-content: center;
          font-size: 1.5rem; margin: 0 auto 16px;
        }

        /* ── STATS ── */
        .stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }
        .stat-card {
          flex: 1; min-width: 120px;
          background: var(--card); border: 1px solid var(--border);
          border-radius: 12px; padding: 16px 20px;
          display: flex; align-items: center; gap: 14px;
        }
        .stat-icon {
          width: 42px; height: 42px; border-radius: 10px;
          display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0;
        }
        .stat-icon.blue  { background: var(--primary-light); color: var(--primary); }
        .stat-icon.green { background: #ecfdf5; color: #059669; }
        .stat-icon.pink  { background: #fdf2f8; color: #db2777; }
        .stat-val { font-size: 1.5rem; font-weight: 700; line-height: 1; }
        .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

        /* search */
        .search-box { position: relative; }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .search-box input { padding-left: 36px; }

        @media (max-width: 600px) {
          .card-header-custom { flex-direction: column; align-items: flex-start; }
          .stats-row { gap: 10px; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom">
    <a href="#" class="brand">
        <div class="icon-wrap"><i class="bi bi-person-vcard-fill" style="color:#fff;font-size:1.1rem;"></i></div>
        Sistem Data KTP
    </a>
</nav>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- MAIN -->
<div class="main-wrap">
    <div class="page-header">
        <h1>Manajemen Data KTP</h1>
        <p>Kelola data Kartu Tanda Penduduk secara digital</p>
    </div>

    <!-- STATS -->
    <div class="stats-row" id="stats-row">
        <div class="stat-card">
            <div class="stat-icon blue"><i class="bi bi-people-fill"></i></div>
            <div>
                <div class="stat-val" id="stat-total">-</div>
                <div class="stat-label">Total Data</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon green"><i class="bi bi-gender-male"></i></div>
            <div>
                <div class="stat-val" id="stat-laki">-</div>
                <div class="stat-label">Laki-laki</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon pink"><i class="bi bi-gender-female"></i></div>
            <div>
                <div class="stat-val" id="stat-perempuan">-</div>
                <div class="stat-label">Perempuan</div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- FORM TAMBAH -->
        <div class="col-lg-4">
            <div class="card-custom">
                <div class="card-header-custom">
                    <h5><i class="bi bi-plus-circle text-primary"></i> <span id="form-title">Tambah Data KTP</span></h5>
                </div>
                <div class="card-body-custom">
                    <form id="ktp-form" novalidate>
                        <input type="hidden" id="edit-id"/>

                        <div class="mb-3">
                            <label class="form-label">Nomor KTP</label>
                            <input type="text" id="nomorKtp" class="form-control" placeholder="16 digit nomor KTP" maxlength="16"/>
                            <div class="invalid-feedback" id="err-nomorKtp"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" id="namaLengkap" class="form-control" placeholder="Nama sesuai KTP"/>
                            <div class="invalid-feedback" id="err-namaLengkap"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Alamat</label>
                            <input type="text" id="alamat" class="form-control" placeholder="Alamat lengkap"/>
                            <div class="invalid-feedback" id="err-alamat"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" class="form-control"/>
                            <div class="invalid-feedback" id="err-tanggalLahir"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Jenis Kelamin</label>
                            <select id="jenisKelamin" class="form-select">
                                <option value="">-- Pilih Jenis Kelamin --</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                            <div class="invalid-feedback" id="err-jenisKelamin"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn-primary-custom flex-fill" id="btn-submit">
                                <i class="bi bi-floppy-fill"></i> <span id="btn-submit-text">Simpan Data</span>
                            </button>
                            <button type="button" class="btn-secondary-custom" id="btn-cancel" style="display:none;" onclick="resetForm()">
                                <i class="bi bi-x-lg"></i> Batal
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- TABEL DATA -->
        <div class="col-lg-8">
            <div class="card-custom">
                <div class="card-header-custom">
                    <h5><i class="bi bi-table text-primary"></i> Daftar Data KTP</h5>
                    <div class="d-flex gap-2 align-items-center flex-wrap">
                        <div class="search-box">
                            <i class="bi bi-search" style="font-size:.85rem;"></i>
                            <input type="text" id="search-input" class="form-control form-control-sm" placeholder="Cari nama / nomor KTP..." style="min-width:200px;" oninput="filterTable()"/>
                        </div>
                        <button class="btn-secondary-custom" onclick="loadData()" style="padding:7px 14px;font-size:.82rem;">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                    </div>
                </div>
                <div id="table-container">
                    <div class="spinner-wrap">
                        <div class="spinner-custom"></div>
                        <p style="color:var(--muted);font-size:.85rem;">Memuat data...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL KONFIRMASI HAPUS -->
<div class="modal-overlay" id="confirm-modal">
    <div class="modal-box" style="max-width:400px;">
        <div class="modal-head">
            <h5>Konfirmasi Hapus</h5>
            <button class="modal-close" onclick="closeConfirmModal()"><i class="bi bi-x"></i></button>
        </div>
        <div class="modal-body-inner" style="text-align:center;">
            <div class="confirm-icon"><i class="bi bi-trash3-fill"></i></div>
            <p style="font-weight:600;margin-bottom:6px;">Hapus data ini?</p>
            <p id="confirm-name" style="color:var(--muted);font-size:.875rem;margin:0;"></p>
        </div>
        <div class="modal-footer-inner">
            <button class="btn-secondary-custom" onclick="closeConfirmModal()">Batal</button>
            <button class="btn-primary-custom" id="btn-confirm-delete" style="background:var(--danger);">
                <i class="bi bi-trash3-fill"></i> Hapus
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script>
    const API = 'http://localhost:8080/ktp';
    let allData = [];
    let deleteId = null;

    /* ─── TOAST ─── */
    function showToast(msg, type = 'success') {
      const icons = { success: 'bi-check-circle-fill', error: 'bi-exclamation-circle-fill', info: 'bi-info-circle-fill' };
      const $t = $(`<div class="toast-item ${type}"><i class="bi ${icons[type]}"></i><span>${msg}</span></div>`);
      $('#toast-container').append($t);
      setTimeout(() => {
        $t.css('animation', 'fadeOut 0.3s ease forwards');
        setTimeout(() => $t.remove(), 300);
      }, 3500);
    }

    /* ─── LOAD DATA ─── */
    function loadData() {
      $('#table-container').html(`
        <div class="spinner-wrap">
          <div class="spinner-custom"></div>
          <p style="color:var(--muted);font-size:.85rem;">Memuat data...</p>
        </div>`);
      $.ajax({
        url: API, method: 'GET',
        success(data) {
          allData = data;
          updateStats(data);
          renderTable(data);
        },
        error(xhr) {
          showToast('Gagal memuat data: ' + (xhr.responseJSON?.message || xhr.statusText), 'error');
          $('#table-container').html(`<div class="empty-state"><div class="empty-icon"><i class="bi bi-wifi-off"></i></div><p>Gagal terhubung ke server</p></div>`);
        }
      });
    }

    /* ─── STATS ─── */
    function updateStats(data) {
      $('#stat-total').text(data.length);
      $('#stat-laki').text(data.filter(d => d.jenisKelamin === 'Laki-laki').length);
      $('#stat-perempuan').text(data.filter(d => d.jenisKelamin === 'Perempuan').length);
    }

    /* ─── RENDER TABLE ─── */
    function renderTable(data) {
      if (!data.length) {
        $('#table-container').html(`<div class="empty-state"><div class="empty-icon"><i class="bi bi-inbox"></i></div><p>Belum ada data KTP tersimpan</p></div>`);
        return;
      }
      let rows = data.map(k => {
        const tgl = k.tanggalLahir ? k.tanggalLahir.split('T')[0] : '-';
        const badge = k.jenisKelamin === 'Laki-laki'
          ? `<span class="badge-gender laki">Laki-laki</span>`
          : `<span class="badge-gender perempuan">Perempuan</span>`;
        return `<tr>
          <td style="font-weight:600;">${k.id}</td>
          <td><code style="font-size:.8rem;background:#f1f5f9;padding:2px 6px;border-radius:5px;">${k.nomorKtp}</code></td>
          <td style="font-weight:500;">${k.namaLengkap}</td>
          <td>${k.alamat}</td>
          <td>${tgl}</td>
          <td>${badge}</td>
          <td>
            <div class="d-flex gap-1">
              <button class="action-btn btn-edit" onclick="editData(${k.id})" title="Edit"><i class="bi bi-pencil-fill"></i></button>
              <button class="action-btn btn-delete" onclick="confirmDelete(${k.id}, '${k.namaLengkap}')" title="Hapus"><i class="bi bi-trash3-fill"></i></button>
            </div>
          </td>
        </tr>`;
      }).join('');

      $('#table-container').html(`
        <div class="table-wrap">
          <table class="ktp-table">
            <thead><tr>
              <th>ID</th><th>Nomor KTP</th><th>Nama Lengkap</th>
              <th>Alamat</th><th>Tgl. Lahir</th><th>Jenis Kelamin</th><th>Aksi</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`);
    }

    /* ─── SEARCH FILTER ─── */
    function filterTable() {
      const q = $('#search-input').val().toLowerCase();
      const filtered = allData.filter(d =>
        d.namaLengkap.toLowerCase().includes(q) || d.nomorKtp.includes(q)
      );
      renderTable(filtered);
    }

    /* ─── VALIDATE ─── */
    function validateForm() {
      let valid = true;
      const fields = ['nomorKtp', 'namaLengkap', 'alamat', 'tanggalLahir', 'jenisKelamin'];
      fields.forEach(f => {
        const $el = $(`#${f}`);
        const val = $el.val().trim();
        $el.removeClass('is-invalid');
        $(`#err-${f}`).text('');
        if (!val) {
          $el.addClass('is-invalid');
          $(`#err-${f}`).text('Field ini wajib diisi');
          valid = false;
        }
      });
      const nom = $('#nomorKtp').val().trim();
      if (nom && (!/^\d{16}$/.test(nom))) {
        $('#nomorKtp').addClass('is-invalid');
        $('#err-nomorKtp').text('Nomor KTP harus 16 digit angka');
        valid = false;
      }
      return valid;
    }

    /* ─── SUBMIT FORM ─── */
    $('#ktp-form').on('submit', function(e) {
      e.preventDefault();
      if (!validateForm()) return;

      const id = $('#edit-id').val();
      const payload = {
        nomorKtp:    $('#nomorKtp').val().trim(),
        namaLengkap: $('#namaLengkap').val().trim(),
        alamat:      $('#alamat').val().trim(),
        tanggalLahir:$('#tanggalLahir').val(),
        jenisKelamin:$('#jenisKelamin').val()
      };

      const isEdit = !!id;
      const $btn = $('#btn-submit');
      $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Menyimpan...');

      $.ajax({
        url: isEdit ? `${API}/${id}` : API,
        method: isEdit ? 'PUT' : 'POST',
        contentType: 'application/json',
        data: JSON.stringify(payload),
        success() {
          showToast(isEdit ? '✓ Data berhasil diperbarui!' : '✓ Data KTP berhasil ditambahkan!', 'success');
          resetForm();
          loadData();
        },
        error(xhr) {
          const msg = xhr.responseJSON?.message || xhr.responseText || 'Terjadi kesalahan';
          showToast('Gagal: ' + msg, 'error');
          if (msg.toLowerCase().includes('nomor ktp') || msg.toLowerCase().includes('duplicate') || xhr.status === 409) {
            $('#nomorKtp').addClass('is-invalid');
            $('#err-nomorKtp').text('Nomor KTP sudah terdaftar');
          }
        },
        complete() {
          $btn.prop('disabled', false).html('<i class="bi bi-floppy-fill"></i> <span id="btn-submit-text">' + (isEdit ? 'Update Data' : 'Simpan Data') + '</span>');
        }
      });
    });

    /* ─── EDIT ─── */
    function editData(id) {
      const d = allData.find(x => x.id === id);
      if (!d) return showToast('Data tidak ditemukan', 'error');

      $('#edit-id').val(d.id);
      $('#nomorKtp').val(d.nomorKtp);
      $('#namaLengkap').val(d.namaLengkap);
      $('#alamat').val(d.alamat);
      $('#tanggalLahir').val(d.tanggalLahir ? d.tanggalLahir.split('T')[0] : '');
      $('#jenisKelamin').val(d.jenisKelamin);

      $('#form-title').text('Edit Data KTP');
      $('#btn-submit-text').text('Update Data');
      $('#btn-cancel').show();
      $('html, body').animate({ scrollTop: 0 }, 300);
      showToast('Mode edit aktif untuk: ' + d.namaLengkap, 'info');
    }

    /* ─── RESET FORM ─── */
    function resetForm() {
      $('#ktp-form')[0].reset();
      $('#edit-id').val('');
      $('#form-title').text('Tambah Data KTP');
      $('#btn-submit-text').text('Simpan Data');
      $('#btn-cancel').hide();
      ['nomorKtp','namaLengkap','alamat','tanggalLahir','jenisKelamin'].forEach(f => {
        $(`#${f}`).removeClass('is-invalid');
        $(`#err-${f}`).text('');
      });
    }

    /* ─── CONFIRM DELETE ─── */
    function confirmDelete(id, nama) {
      deleteId = id;
      $('#confirm-name').text('Nama: ' + nama);
      $('#confirm-modal').addClass('active');
    }
    function closeConfirmModal() {
      $('#confirm-modal').removeClass('active');
      deleteId = null;
    }
    $('#btn-confirm-delete').on('click', function() {
      if (!deleteId) return;
      const $btn = $(this);
      $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span>');
      $.ajax({
        url: `${API}/${deleteId}`, method: 'DELETE',
        success() {
          showToast('✓ Data berhasil dihapus!', 'success');
          closeConfirmModal();
          loadData();
        },
        error(xhr) {
          const msg = xhr.responseJSON?.message || 'Gagal menghapus data';
          showToast('Error: ' + msg, 'error');
          closeConfirmModal();
        },
        complete() { $btn.prop('disabled', false).html('<i class="bi bi-trash3-fill"></i> Hapus'); }
      });
    });

    /* ─── CLOSE MODAL CLICK OUTSIDE ─── */
    $('#confirm-modal').on('click', function(e) {
      if ($(e.target).is('#confirm-modal')) closeConfirmModal();
    });

    /* ─── INIT ─── */
    $(document).ready(() => loadData());
</script>
</body>
</html>
